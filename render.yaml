services:
  - type: web
    name: nrutyapuri-ticket-server
    runtime: node
    plan: free
    rootDir: ticket-server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: EVENT_NAME
        value: Arpana
      - key: TOTAL_TICKETS
        value: "500"
      - key: PRICE_INR
        value: "100"
      - key: TICKET_PREFIX
        value: ARPANA
      - key: ALLOWED_ORIGINS
        value: https://kunal-1601khandelwal.github.io
      # secrets & event details — set these in the Render dashboard (sync:false = not in repo)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: ACADEMY_EMAIL
        sync: false
      - key: EVENT_DATE
        sync: false
      - key: EVENT_VENUE
        sync: false
